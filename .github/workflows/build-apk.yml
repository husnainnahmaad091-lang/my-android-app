name: Build APK

on:
 push:
  branches: [ main ]

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
  - uses: actions/checkout@v3

  - name: Setup Java
    uses: actions/setup-java@v3
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Grant permission
    run: chmod +x gradlew

  - name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: app-debug
    path: app/build/outputs/apk/debug/app-debug.apk
     
